<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PattaMansa — Painel Executivo</title>
<style>
:root {
  --bg:     #09090b;
  --card:   #111115;
  --card2:  #18181f;
  --border: rgba(255,255,255,.07);
  --bh:     rgba(255,255,255,.12);
  --text:   #fafafa;
  --t2:     #a1a1aa;
  --t3:     #52525b;
  --green:  #22c55e;
  --gdim:   rgba(34,197,94,.1);
  --amber:  #f59e0b;
  --adim:   rgba(245,158,11,.1);
  --purple: #818cf8;
  --pdim:   rgba(129,140,248,.12);
  --r:      16px;
  --rs:     10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
  font-size: 15px;
}

/* ── HEADER ── */
header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  background: rgba(9,9,11,.92);
  backdrop-filter: blur(20px);
}
.hdr-logo {
  font-size: 16px; font-weight: 700; letter-spacing: -.03em;
  display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
}
.hdr-pulse {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
  animation: pulse 2.4s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,.4); }
  60%      { box-shadow: 0 0 0 5px rgba(34,197,94,0); }
}
.hdr-sub { font-size: 12px; color: var(--t3); }

/* ── LAYOUT ── */
main { max-width: 680px; margin: 0 auto; padding: 28px 16px 60px; display: flex; flex-direction: column; gap: 32px; }
.sec-lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--t3); margin-bottom: 12px; }

/* ── KPIs ── */
.kpi-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.kpi {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 22px 18px; transition: border-color .15s;
}
.kpi:hover { border-color: var(--bh); }
.kpi-lbl { font-size: 11px; font-weight: 500; color: var(--t3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
.kpi-val { font-size: clamp(22px,5vw,30px); font-weight: 800; letter-spacing: -.04em; line-height: 1; font-variant-numeric: tabular-nums; }
.kpi-val.g { color: var(--green); }
.kpi-val.p { color: var(--purple); }
.kpi-sub  { font-size: 11px; color: var(--t3); margin-top: 6px; }
.kpi-note { font-size: 10px; color: var(--amber); margin-top: 5px; }

/* ── RESUMO EXECUTIVO ── */
.exec-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden; position: relative;
}
.exec-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--green), rgba(34,197,94,0));
}
.exec-header {
  padding: 20px 20px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.exec-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.exec-date  { font-size: 11px; color: var(--t3); }
.exec-body  { padding: 20px; display: flex; flex-direction: column; gap: 20px; }

.meta-status {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 600; color: var(--green);
}
.meta-dot   { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.meta-count { font-size: 12px; color: var(--t2); font-weight: 400; }

.cr-list { display: flex; flex-direction: column; gap: 10px; }
.cr-item {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 14px 16px; border-radius: var(--rs);
}
.cr-item.leader  { background: var(--gdim); border: 1px solid rgba(34,197,94,.15); }
.cr-item.testing { background: var(--adim); border: 1px solid rgba(245,158,11,.15); }
.cr-rank { font-size: 20px; flex-shrink: 0; line-height: 1.3; }
.cr-lbl  { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--t3); margin-bottom: 3px; }
.cr-name { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.cr-notes { list-style: none; }
.cr-notes li { font-size: 12px; color: var(--t2); line-height: 1.6; }
.cr-notes li::before { content: '• '; color: var(--t3); }

.paused-block { padding-top: 16px; border-top: 1px solid var(--border); }
.paused-lbl  { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--t3); margin-bottom: 10px; }
.paused-item { font-size: 12px; color: var(--t3); line-height: 2; }

.goal-block {
  background: var(--pdim); border: 1px solid rgba(129,140,248,.2);
  border-radius: var(--rs); padding: 14px 16px;
  display: flex; gap: 10px; align-items: flex-start;
}
.goal-ico { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
.goal-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--purple); margin-bottom: 5px; }
.goal-txt { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.6; }

/* ── PRODUTOS ── */
.prod-list { display: flex; flex-direction: column; gap: 8px; }
.prod-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--rs); padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  transition: border-color .15s;
}
.prod-item:hover { border-color: var(--bh); }
.prod-name { font-size: 13px; font-weight: 500; }
.prod-sub  { font-size: 11px; color: var(--t3); margin-top: 2px; }
.prod-rev  { font-size: 18px; font-weight: 800; color: var(--green); white-space: nowrap; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }

/* ── FOOTER ── */
footer { max-width: 680px; margin: 0 auto; padding: 16px 16px 40px; border-top: 1px solid var(--border); font-size: 11px; color: var(--t3); }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--card2); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="hdr-logo"><div class="hdr-pulse"></div>PattaMansa</div>
  <div class="hdr-sub" id="hdrSub">—</div>
</header>

<main>

  <!-- 1 · VISÃO GERAL -->
  <section>
    <div class="sec-lbl">Visão geral</div>
    <div class="kpi-grid" id="kpiGrid"></div>
  </section>

  <!-- 2 · RESUMO EXECUTIVO -->
  <section>
    <div class="sec-lbl">Resumo executivo</div>
    <div class="exec-card" id="execCard"></div>
  </section>

  <!-- 3 · PRODUTOS VENDIDOS -->
  <section>
    <div class="sec-lbl">Produtos vendidos</div>
    <div class="prod-list" id="prodList"></div>
  </section>

</main>

<footer id="footer">—</footer>

<script>
// ═══════════════════════════════════════════════
//  RESUMO EXECUTIVO — edite aqui para atualizar
// ═══════════════════════════════════════════════
const executiveSummary = {
  date:     '15/06',
  adsActive: 2,
  leader: {
    name:  'Mostrando Camiseta',
    notes: [
      'Principal anúncio da conta',
      'Recebendo a maior parte da entrega do Meta',
    ],
  },
  testing: {
    name:  'SELFIE · Caramelo FC',
    notes: [
      'Coletando dados',
      'Aguardando mais volume para avaliação',
    ],
  },
  paused: ['Caramelo Brasileiro', 'Convocação'],
  goal:   'Transformar os carrinhos gerados em checkouts e primeiras vendas.',
};

// ═══════════════════════════════════════════════
//  DADOS FINANCEIROS — Shopify
// ═══════════════════════════════════════════════
const DATA = {
  period:      '15 Mai – 15 Jun 2026',
  lastUpdated: '15/06/2026',
  shopify: {
    revenue: 239.15,
    orders:  2,
    note:    'Inclui pedido orgânico de 07/06',
  },
  metaAds: { spent: 36.86 },
  products: [
    { name:'Clube Seleção Canina · Oversized · Unissex', orders:1, revenue:128.12, date:'07/06' },
    { name:'Clube Canino · Regular · Masculina',         orders:1, revenue:111.03, date:'12/06' },
  ],
};

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
const R = v => 'R$ ' + Number(v).toFixed(2).replace('.', ',');

// ═══════════════════════════════════════════════
//  RENDERS
// ═══════════════════════════════════════════════
function renderHeader() {
  document.getElementById('hdrSub').textContent =
    DATA.period + '  ·  Atualizado ' + DATA.lastUpdated;
}

function renderKPIs() {
  const s    = DATA.shopify;
  const roas = (s.revenue / DATA.metaAds.spent).toFixed(2);
  const cards = [
    { lbl:'Receita',       val:R(s.revenue), cls:'g', sub:'pedidos pagos'             },
    { lbl:'Pedidos pagos', val:s.orders,     cls:'',  sub:'no período'                },
    { lbl:'ROAS estimado', val:roas + 'x',   cls:'p', sub:'receita ÷ investimento', note:s.note },
  ];
  document.getElementById('kpiGrid').innerHTML = cards.map(c => `
    <div class="kpi">
      <div class="kpi-lbl">${c.lbl}</div>
      <div class="kpi-val ${c.cls}">${c.val}</div>
      <div class="kpi-sub">${c.sub}</div>
      ${c.note ? `<div class="kpi-note">⚠ ${c.note}</div>` : ''}
    </div>`).join('');
}

function renderExec() {
  const e = executiveSummary;
  document.getElementById('execCard').innerHTML = `
    <div class="exec-header">
      <div class="exec-title">📅 Resumo — ${e.date}</div>
      <div class="exec-date">Atualizado em ${e.date}</div>
    </div>
    <div class="exec-body">

      <div class="meta-status">
        <div class="meta-dot"></div>
        Meta Ads
        <span class="meta-count">${e.adsActive} anúncios ativos</span>
      </div>

      <div class="cr-list">
        <div class="cr-item leader">
          <div class="cr-rank">🥇</div>
          <div>
            <div class="cr-lbl">Criativo líder</div>
            <div class="cr-name">${e.leader.name}</div>
            <ul class="cr-notes">${e.leader.notes.map(n => `<li>${n}</li>`).join('')}</ul>
          </div>
        </div>
        <div class="cr-item testing">
          <div class="cr-rank">🥈</div>
          <div>
            <div class="cr-lbl">Em teste</div>
            <div class="cr-name">${e.testing.name}</div>
            <ul class="cr-notes">${e.testing.notes.map(n => `<li>${n}</li>`).join('')}</ul>
          </div>
        </div>
      </div>

      <div class="paused-block">
        <div class="paused-lbl">⏸ Pausados</div>
        ${e.paused.map(p => `<div class="paused-item">• ${p}</div>`).join('')}
      </div>

      <div class="goal-block">
        <div class="goal-ico">🎯</div>
        <div>
          <div class="goal-lbl">Próximo objetivo</div>
          <div class="goal-txt">${e.goal}</div>
        </div>
      </div>

    </div>`;
}

function renderProducts() {
  document.getElementById('prodList').innerHTML = DATA.products.map(p => `
    <div class="prod-item">
      <div>
        <div class="prod-name">${p.name}</div>
        <div class="prod-sub">${p.orders} pedido · ${p.date}</div>
      </div>
      <div class="prod-rev">${R(p.revenue)}</div>
    </div>`).join('');
}

function renderFooter() {
  document.getElementById('footer').textContent =
    'PattaMansa · ' + DATA.period + ' · Atualizado ' + DATA.lastUpdated;
}

document.addEventListener('DOMContentLoaded', function () {
  renderHeader();
  renderKPIs();
  renderExec();
  renderProducts();
  renderFooter();
});
</script>
</body>
</html>
